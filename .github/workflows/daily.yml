name: Daily Commit Workflow

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: 23f3001390@ds.study.iitm.ac.in - Make daily commit
        run: |
          echo "Daily update at $(date)" >> daily-log.txt
          git config user.name "github-actions"
          git config user.email "23f3001390@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily commit" || echo "No changes to commit"
          git push
